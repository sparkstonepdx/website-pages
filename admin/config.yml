# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json
backend:
  name: github
  repo: sparkstonepdx/website-src
  base_url: https://sveltia-cms-auth.sparkstonepdx.workers.dev

media_folder: "/public"
public_folder: "/"
app_title: Sparkstone Admin

collections:
  - name: Posts
    label: Posts
    create: true
    folder: "src/routes/post/"
    preview_path: "/post/{{filename}}"
    fields:
      - {label: "Title", name: "title", widget: "string", pattern: ['.{5,}', "Must have at least 20 characters"] }
      - {name: "layout", widget: "hidden", default: "post"}
      - {label: "Created", name: "created", widget: "datetime", default: "{{now}}" }
      - {label: "Published", name: "published", widget: "datetime", default: "{{now}}"}
      - {label: "Featured Image", name: "thumbnail", widget: "image", required: false}
      - {label: "Featured Image Alt", name: "thumbnailAlt", widget: "string", required: false }
      - {label: 'Blurb', name: 'blurb', widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: projects
    label: Projects
    create: true
    folder: "src/routes/project/"
    preview_path: "/project/{{filename}}"
    fields:
      - {label: "Title", name: "title", widget: "string", pattern: ['.{5,}', "Must have at least 20 characters"] }
      - {label: "Popularity Rank", name: 'rank', widget: "number", required: false}
      - {  name: "layout", widget: "hidden", default: "post"}
      - {label: "Created", name: "created", widget: "datetime", default: "{{now}}" }
      - {label: "Published", name: "published", widget: "datetime", default: "{{now}}"}
      - {label: "Featured Image", name: "thumbnail", widget: "image", required: false}
      - {label: "Featured Image Alt", name: "thumbnailAlt", widget: "string", required: false }
      - {label: 'Blurb', name: 'blurb', widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: Contributors
    label: Contributors
    create: true
    folder: "src/data/contributors/"
    fields:
      - {label: "Name", name: "name", widget: "string"}
      - {label: "Profile Photo", name: "profilePhoto", widget: "image", required: false }
      - {label: "Role", name: "role", widget: "string", required: false}
      - {label: "Testimony", name: "testimony", widget: "text"}
  - name: Emails
    label: Emails
    create: true
    folder: "public/email-templates/"
    preview_path: "/email-templates/{{filename}}"
    fields:
      - {label: "Template Name", name: "name", widget: "string"}
      - {label: "From Email", name: "from", widget: "email"}
      - {label: "Subject", name: "subject", widget: "string", }
      - {label: "Body", name: "body", widget: "markdown",}
